services:
  # ============================================================================
  # PostgreSQL: Relational Storage for workspaces, logs, and telemetry
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: aios-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aiospassword
      POSTGRES_DB: aios_db
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aios_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aios-network

  # ============================================================================
  # Qdrant: Vector Database for multi-vector semantic RAG search
  # ============================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aios-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aios-network

  # ============================================================================
  # Redis: PubSub broker, caching layer, and websocket channel cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: aios-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aios-network

  # ============================================================================
  # Backend: Python FastAPI server
  # ============================================================================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aios-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:aiospassword@postgres:5432/aios_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aios-network

  # ============================================================================
  # Frontend: Next.js Web App
  # ============================================================================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: aios-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY:-AIzaSyB1ckhyvPc-S8oMPzstGYHdPXL5jXRH3oY}
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-ai-engineer-os-1ae7d.firebaseapp.com}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-ai-engineer-os-1ae7d}
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-ai-engineer-os-1ae7d.firebasestorage.app}
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-140279251498}
      - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID:-1:140279251498:web:aeda901043051ff99b7953}
    depends_on:
      - backend
    networks:
      - aios-network

volumes:
  postgres-data:
    name: aios-postgres-data
  qdrant-data:
    name: aios-qdrant-data
  redis-data:
    name: aios-redis-data

networks:
  aios-network:
    name: aios-network
    driver: bridge
