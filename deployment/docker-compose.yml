services:
  # ============================================================================
  # PostgreSQL: Relational Storage for workspaces, logs, and telemetry
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: aios-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aiospassword
      POSTGRES_DB: aios_db
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aios_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aios-network

  # ============================================================================
  # Qdrant: Vector Database for multi-vector semantic RAG search
  # ============================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aios-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aios-network

  # ============================================================================
  # Redis: PubSub broker, caching layer, and websocket channel cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: aios-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aios-network

volumes:
  postgres-data:
    name: aios-postgres-data
  qdrant-data:
    name: aios-qdrant-data
  redis-data:
    name: aios-redis-data

networks:
  aios-network:
    name: aios-network
    driver: bridge
